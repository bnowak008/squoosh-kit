pre-commit:
  parallel: true
  commands:
    format:
      run: bunx prettier --write {staged_files}
      glob: '*.{ts,tsx,js,json,md,yaml,yml}'
      stage_fixed: true
    lint:
      run: bunx eslint --fix {staged_files}
      glob: '*.{ts,tsx,js,mjs,cjs}'
      stage_fixed: true

pre-push:
  parallel: false
  commands:
    typecheck:
      run: bun run check-types
    test:
      run: bun run test
