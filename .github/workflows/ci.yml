name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish (e.g. v0.2.1) — tag must already exist in the repo'
        required: true
        type: string

# Cancel duplicate runs on same branch/PR to avoid wasted CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile --linker=hoisted

      - name: Type check
        run: bun run check-types

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Test
        run: bun run test

      - name: Build
        run: bun run ci:build

      - name: Validate artifacts
        run: bun run validate:artifacts

      - name: Upload Squoosh site (for Cloudflare Pages direct deploy)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: squoosh-pages-dist
          path: apps/squoosh/dist
          retention-days: 7

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile --linker=hoisted

      - name: Security audit
        run: bun audit --audit-level=high

  # Publishes to npm only when you push a version tag (e.g. v0.1.19), not on main.
  # Bump versions in package.json files, commit, then: git tag v0.1.19 && git push origin v0.1.19
  # Requires repository secret NPM_TOKEN. Tag must match the version in package.json (see Verify step).
  # Semver prereleases (e.g. 1.0.0-rc.1) publish to dist-tag "rc" so: npm install @squoosh-kit/core@rc
  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: [test, security]
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.version, 'v'))
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile --linker=hoisted

      - name: Build
        run: bun run ci:build

      - name: Validate artifacts
        run: bun run validate:artifacts

      - name: Verify version consistency
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_VERSION="${{ inputs.version }}"
            TAG_VERSION="${TAG_VERSION#v}"
          else
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          ROOT_VERSION=$(bun -e "console.log(require('./package.json').version)")
          if [ "$TAG_VERSION" != "$ROOT_VERSION" ]; then
            echo "ERROR: Tag $TAG_VERSION does not match package.json $ROOT_VERSION"
            exit 1
          fi
          for pkg in runtime webp resize core vite-plugin avif hqx imagequant jxl mozjpeg oxipng png qoi wp2 rotate visdif; do
            PKG_VERSION=$(bun -e "console.log(require('./packages/$pkg/package.json').version)")
            if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
              echo "ERROR: Tag $TAG_VERSION does not match packages/$pkg/package.json $PKG_VERSION"
              exit 1
            fi
          done
          echo "All package versions match tag $TAG_VERSION"

      - name: Prerelease metadata (npm dist-tag + GitHub release)
        id: prerelease
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_VERSION="${{ inputs.version }}"
            TAG_VERSION="${TAG_VERSION#v}"
          else
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          if [[ "$TAG_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+- ]]; then
            echo "NPM_PUBLISH_TAG=rc" >> "$GITHUB_ENV"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Prerelease: publishing to npm dist-tag rc"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Stable: publishing to npm default dist-tag (latest)"
          fi

      - name: Publish to NPM
        run: bun run release:publish
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        env:
          IS_PRERELEASE: ${{ steps.prerelease.outputs.is_prerelease }}
          DISPATCH_VERSION: ${{ inputs.version }}
        with:
          script: |
            const tag = context.eventName === 'workflow_dispatch'
              ? process.env.DISPATCH_VERSION
              : context.ref.replace('refs/tags/', '');
            const prerelease = process.env.IS_PRERELEASE === 'true';
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              generate_release_notes: true,
              draft: false,
              prerelease,
            });

  deploy-pages:
    name: Deploy site to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: squoosh-pages-dist
          path: site

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=squoosh-kit
