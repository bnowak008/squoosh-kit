name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel duplicate runs on same branch to avoid wasted CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile --linker=hoisted

      - name: Build
        run: bun run ci:build

      - name: Validate artifacts
        run: bun run validate:artifacts

      - name: Upload Squoosh site
        uses: actions/upload-artifact@v4
        with:
          name: squoosh-pages-dist
          path: apps/squoosh/dist
          retention-days: 7

  deploy-pages:
    name: Deploy site to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    steps:
      - name: Download built site
        uses: actions/download-artifact@v8
        with:
          name: squoosh-pages-dist
          path: site

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=squoosh-kit

  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile --linker=hoisted

      - name: Check if version is new
        id: version_check
        run: |
          CURRENT_VERSION=$(bun -e "console.log(require('./package.json').version)")
          echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          if npm view "@squoosh-kit/core@$CURRENT_VERSION" version &>/dev/null 2>&1; then
            echo "is_new_version=false" >> "$GITHUB_OUTPUT"
            echo "Version $CURRENT_VERSION already published — skipping npm publish"
          else
            echo "is_new_version=true" >> "$GITHUB_OUTPUT"
            echo "Version $CURRENT_VERSION is new — will publish to npm"
          fi

      - name: Verify all package versions match
        if: steps.version_check.outputs.is_new_version == 'true'
        run: |
          TAG_VERSION="${{ steps.version_check.outputs.version }}"
          for pkg in runtime webp resize core vite-plugin avif hqx imagequant jxl mozjpeg oxipng png qoi wp2 rotate visdif; do
            PKG_VERSION=$(bun -e "console.log(require('./packages/$pkg/package.json').version)")
            if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
              echo "ERROR: Root version $TAG_VERSION does not match packages/$pkg/package.json $PKG_VERSION"
              exit 1
            fi
          done
          echo "All package versions match $TAG_VERSION"

      - name: Prerelease metadata
        id: prerelease
        if: steps.version_check.outputs.is_new_version == 'true'
        run: |
          TAG_VERSION="${{ steps.version_check.outputs.version }}"
          if [[ "$TAG_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+- ]]; then
            echo "NPM_PUBLISH_TAG=rc" >> "$GITHUB_ENV"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Prerelease: publishing to npm dist-tag rc"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Stable: publishing to npm default dist-tag (latest)"
          fi

      - name: Publish to NPM
        if: steps.version_check.outputs.is_new_version == 'true'
        run: bun run release:publish
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Create git tag
        if: steps.version_check.outputs.is_new_version == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version_check.outputs.version }}"
          git push origin "v${{ steps.version_check.outputs.version }}"

      - name: Create GitHub Release
        if: steps.version_check.outputs.is_new_version == 'true'
        uses: actions/github-script@v7
        env:
          IS_PRERELEASE: ${{ steps.prerelease.outputs.is_prerelease }}
        with:
          script: |
            const version = '${{ steps.version_check.outputs.version }}';
            const tag = `v${version}`;
            const prerelease = process.env.IS_PRERELEASE === 'true';
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              generate_release_notes: true,
              draft: false,
              prerelease,
            });
